e can with a calculator. He survived. The system survived with him.",`Here's what makes it remarkable: it requires no multiplication tables. None. If you can add small numbers, you can learn this. Trachtenberg first taught it to children who'd failed at math — kids who thought they were "just bad at numbers." Within weeks they were doing lightning calculation. They described it as feeling like a game.`,"This trainer teaches that system the way it deserves to be taught: one rule at a time, each explained until it actually makes sense — not memorized, understood. You'll start by multiplying by 11, which you'll be able to do almost immediately. Then you'll learn why it works. Then you'll build from there.","No tables. No tricks you take on faith. Just a way of seeing numbers that, once you have it, you keep."]},Xf={11:{rule:"Add each digit to its right-hand neighbor.",intro:"That's the whole rule. But the wording hides a couple of habits you need — let's make them explicit.",examples:[{n:633,label:"A clean one (no carrying)",steps:["Write a zero in front: 0633. That zero is a real working position, not decoration.","Rightmost digit (3): no neighbor to its right, so it stays. Write 3.","Next (3): add its right neighbor (3). 3 + 3 = 6. Write 6.","Next (6): add its right neighbor (3). 6 + 3 = 9. Write 9.","Leading 0: add its neighbor (6). 0 + 6 = 6. Write 6."],answer:"6963"},{n:758,label:"Now with carrying",steps:["Pad the zero: 0758.","8 (no neighbor): write 8.","5 + 8 = 13. Write 3, carry 1.","7 + 5 = 12, + carried 1 = 13. Write 3, carry 1.","0 + 7 = 7, + carried 1 = 8. Write 8."],answer:"8338"}],why:["Multiplying by 11 is multiplying by 10, then adding one more copy of the number: 11 × N = (10 × N) + N.",`When you multiply by 10, every digit shifts one place left. So in any column of the answer, the part from "×10" is just the digit to the right — its neighbor. The "+ N" part adds the digit itself. Together, each column = the digit plus its neighbor. That's the rule. You're reading off a shift-and-add, not memorizing a trick.`],watch:["The leading zero feels pointless, so beginners skip it — and their answer comes out one digit short. It's where the final carry lands. Always pad the zero."]},12:{rule:"Double each digit, then add its right-hand neighbor.",intro:"Same shape as ×11 — right to left, neighbor is the digit to the right, carry as usual — with one change: double each digit first.",examples:[{n:413,label:"A clean one",steps:["Pad: 0413.","Rightmost (3): double (6); no neighbor. Write 6.","Next (1): double (2), + neighbor (3) = 5. Write 5.","Next (4): double (8), + neighbor (1) = 9. Write 9.","Leading 0: double (0), + neighbor (4) = 4. Write 4."],answer:"4956"},{n:367,label:"With carrying",steps:["Pad: 0367.","7 doubled = 14. Write 4, carry 1.","6 doubled = 12, + neighbor 7 = 19, + carry 1 = 20. Write 0, carry 2.","3 doubled = 6, + neighbor 6 = 12, + carry 2 = 14. Write 4, carry 1.","0 doubled = 0, + neighbor 3 = 3, + carry 1 = 4. Write 4."],answer:"4404"}],why:["Same logic as ×11, one step further: 12 × N = (10 × N) + (2 × N).",`The "×10" part contributes the neighbor (the shift). The "× 2" part contributes two copies of the digit — which is why you double it. Neighbor plus twice the digit. That's the rule.`],watch:["Double first, then add the neighbor, then add the carry — in that order. The digit gets doubled; the neighbor does not."]},6:{rule:"Take the digit, add half its right neighbor (drop the fraction); add 5 if the digit is odd.",intro:'The first rule with a "half" and the first with the odd-→-+5 move. Both come from the same place, which the "why" makes clear.',examples:[{n:622,label:"All-even digits",steps:["Pad: 0622.","Rightmost (2): even, no +5. No neighbor, + 0. = 2. Write 2.","Next (2): even. Half of neighbor (2) = 1. 2 + 1 = 3. Write 3.","Next (6): even. Half of neighbor (2) = 1. 6 + 1 = 7. Write 7.","Leading 0: even. Half of neighbor (6) = 3. 0 + 3 = 3. Write 3."],answer:"3732"},{n:35,label:"With odd digits (the +5 in action)",steps:["Pad: 035.","5: odd, +5. No neighbor. 5 + 5 = 10. Write 0, carry 1.","3: odd, +5. Half neighbor (5) = 2 (drop the .5). 3 + 2 + 5 = 10, + carry 1 = 11. Write 1, carry 1.","0: even. Half neighbor (3) = 1. 0 + 1 + carry 1 = 2. Write 2."],answer:"210"}],why:[`6 = 5 + 1, so 6 × N = (5 × N) + N. The "+ N" is the plain digit. The "× 5" part is where "half the neighbor, +5 if odd" comes from — and it drives ×5, ×6, ×7, ×4, and ×3, so it's worth seeing once.`,"Look at 5 × a single digit: 5×6 = 30, 5×7 = 35, 5×8 = 40. Two patterns: the TENS of 5×d is exactly half of d (rounded down); the UNITS are 5 when d is odd, 0 when even.",`Working right to left, each column collects the TENS from the neighbor's ×5 ("half the neighbor") plus the UNITS from its own digit's ×5 ("+5 if odd"). They aren't two rules — they're the tens and units of one ×5, landing in two columns.`],watch:[`"Half" means floor — throw the fraction away. Half of 7 is 3, not 3.5. The dropped half is already paid for by the +5-if-odd; don't count it twice.`,"Judge odd/even on the digit itself, not on anything added to it."]},7:{rule:"Double the digit, add half the neighbor; add 5 if the digit is odd.",intro:"It's ×6 with one change: double the digit first. (The same step ×12 added to ×11.)",examples:[{n:421,label:"Worked example",steps:["Pad: 0421.","1: odd, +5. Doubled = 2. No neighbor. 2 + 5 = 7. Write 7.","2: even. Doubled = 4. Half neighbor (1) = 0. 4 + 0 = 4. Write 4.","4: even. Doubled = 8. Half neighbor (2) = 1. 8 + 1 = 9. Write 9.","0: even. Doubled = 0. Half neighbor (4) = 2. 0 + 2 = 2. Write 2."],answer:"2947"}],why:['7 = 5 + 2, so 7 × N = (5 × N) + (2 × N). The ×5 engine gives "half the neighbor, +5 if odd," exactly as in ×6. The "× 2" doubles the digit. Same engine, doubled digit part.'],watch:["Decide odd/even on the ORIGINAL digit, before doubling. A doubled digit is always even — so if you judged after doubling, you'd never add 5, and you'd be wrong."]},5:{rule:"Take half the neighbor; add 5 if the digit is odd. (The digit only matters for odd/even.)",intro:'The pure ×5 engine, naked — no digit added on top. If you understood the "why" of ×6, you already understand this completely.',examples:[{n:426,label:"All-even",steps:["Pad: 0426.","6: even, no +5. No neighbor. 0. Write 0.","2: even. Half neighbor (6) = 3. Write 3.","4: even. Half neighbor (2) = 1. Write 1.","0: even. Half neighbor (4) = 2. Write 2."],answer:"2130"},{n:37,label:"With odd digits",steps:["Pad: 037.","7: odd, +5. No neighbor. 5. Write 5.","3: odd, +5. Half neighbor (7) = 3. 3 + 5 = 8. Write 8.","0: even. Half neighbor (3) = 1. Write 1."],answer:"185"}],why:["5 = 5 + 0. Pure engine, no digit term. Everything you write is the tens-and-units of ×5 split across columns: half the neighbor (tens), plus 5 when the digit is odd (units). Nothing else."],watch:["It feels like the digit should appear somewhere. It doesn't — except to tell you odd or even. The value depends on the neighbor (halved) and the digit's parity, never the digit's size."]},9:{rule:"Right digit: 10 − digit. Middle: (9 − digit) + neighbor. Front: neighbor − 1.",intro:"The first subtraction rule. It looks different, but it comes from the same kind of decomposition.",examples:[{n:524,label:"Worked example",steps:["Pad: 0524.","Rightmost (4): 10 − 4 = 6. Write 6.","Middle (2): 9 − 2 = 7, + neighbor (4) = 11. Write 1, carry 1.","Middle (5): 9 − 5 = 4, + neighbor (2) = 6, + carry 1 = 7. Write 7.","Front (neighbor 5): 5 − 1 = 4. Write 4."],answer:"4716"}],why:[`9 = 10 − 1, so 9 × N = (10 × N) − N. The ×10 gives the neighbor (the shift). The "− N" subtracts the digit. Subtracting straight would push columns negative, so each column borrows 10 and repays it next door — that's why the middle reads 9 − digit (10 borrowed − 1 repaid) plus the neighbor. The rightmost owes no repayment yet (full 10 − digit), and the front settles the last borrow (neighbor − 1).`],watch:["Three positions, three slightly different moves: rightmost uses 10; middles use 9 and add the neighbor; front knocks off 1. Track which column you're in."]},8:{rule:"Right: 2 × (10 − digit). Middle: 2 × (9 − digit) + neighbor. Front: neighbor − 2.",intro:`It's ×9 with the subtractions doubled and 2 knocked off the front instead of 1. (The same "double it" step ×7 added to ×6.)`,examples:[{n:432,label:"Worked example",steps:["Pad: 0432.","Rightmost (2): (10 − 2) = 8, doubled = 16. Write 6, carry 1.","Middle (3): (9 − 3) = 6, doubled = 12, + neighbor (2) = 14, + carry 1 = 15. Write 5, carry 1.","Middle (4): (9 − 4) = 5, doubled = 10, + neighbor (3) = 13, + carry 1 = 14. Write 4, carry 1.","Front (neighbor 4): 4 − 2 = 2, + carry 1 = 3. Write 3."],answer:"3456"}],why:['8 = 10 − 2, so 8 × N = (10 × N) − (2 × N). The ×10 gives the neighbor; the "− 2N" is the doubled subtraction. Everything that was "minus one copy" in ×9 becomes "minus two copies," so each subtracted piece is doubled and the front loses 2 instead of 1.'],watch:["Double the subtracted result, THEN add the neighbor (the neighbor is not doubled). The front knocks off 2, not 1."]},4:{rule:"Right: (10 − digit), +5 if odd. Middle: (9 − digit), +5 if odd, + half the neighbor. Front: half the neighbor − 1.",intro:"×4 combines two things you've met: the subtraction move (from ×9) and the half-neighbor / odd-+5 move (from the ×5 family). Nothing new — both at once.",examples:[{n:624,label:"Worked example",steps:["Pad: 0624.","Rightmost (4): even. 10 − 4 = 6. Write 6.","Middle (2): even. 9 − 2 = 7. Half neighbor (4) = 2. 7 + 2 = 9. Write 9.","Middle (6): even. 9 − 6 = 3. Half neighbor (2) = 1. 3 + 1 = 4. Write 4.","Front (neighbor 6): half of 6 = 3, − 1 = 2. Write 2."],answer:"2496"}],why:[`4 = 5 − 1, so 4 × N = (5 × N) − N. The ×5 engine supplies the half-neighbor and +5-if-odd; the "− N" supplies the subtraction (10 − digit on the right, 9 − digit in the middle). It's the ×5 family and the subtraction family meeting in one rule.`],watch:["This rule asks for
